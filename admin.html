<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <title>Admin Control - Jrvezh School</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #2c3e50; color: white; display: flex; justify-content: center; padding: 20px; }
        .panel { background: rgba(255,255,255,0.1); padding: 25px; border-radius: 10px; width: 100%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        h3 { border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; font-weight: 300; margin-top: 20px; }
        input, select, textarea, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: none; box-sizing: border-box; font-size: 14px; }
        input, textarea, select { background: rgba(255,255,255,0.9); color: #333; }
        .btn-call { background: #27ae60; color: white; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; }
        .btn-call:hover { background: #2ecc71; }
        .btn-ad { background: #2980b9; color: white; cursor: pointer; }
        .btn-full { background: #8e44ad; color: white; cursor: pointer; }
        .btn-clear { background: #c0392b; color: white; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="panel">
        <h2 style="text-align:center; font-weight: 300;">ԿԱՌԱՎԱՐՈՒՄ</h2>

        <h3>ԿԱՆՉ</h3>
        <input type="text" id="ticket" placeholder="Կտրոնի համարը (օր. AC100)">
        
        <label style="font-size: 12px; color: #bdc3c7;">Ընտրիր Պատուհանը | Լոգոն</label>
        <select id="config-select">
            <option value="1" data-logo="https://b24.am/pub/uploads/2009/09/BBA-Logo-center-1200-x-630-copy.webp">1 | Բիբլոս</option>
            <option value="2" data-logo="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRQNiko9gQ0W7elDxBu1AN1AAXsMYUzFXlw_A&s">2 | Ամերիա</option>
            <option value="3" data-logo="https://upload.wikimedia.org/wikipedia/commons/4/41/Acba-logo.png">3 | ԱԿԲԱ</option>
            <option value="4" data-logo="https://b24.am/ru/pub/uploads/2009/09/inecobank_568896460_907918220.jpg">4 | Ինեկոբանկ</option>
            <option value="5" data-logo="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR0BvZKr1CCWXsWSkFALV5RY3znxaB1wYzhQQ&s">5 | ՀԷԲ</option>
        </select>
        
        <button class="btn-call" onclick="sendCall()">ԿԱՆՉԵԼ</button>
        <button type="button" style="background: #e67e22; color: white;" onclick="clearTicket()">ՋՆՋԵԼ ՀԱՄԱՐԸ ԷԿՐԱՆԻՑ</button>
        <h3>ԳՈՎԱԶԴՆԵՐ</h3>
        <textarea id="ad-urls" placeholder="Լինքերը անջատիր կետ-ստորակետով (;)"></textarea>
        <button class="btn-ad" onclick="sendAds()">ԹԱՐՄԱՑՆԵԼ ԳՈՎԱԶԴՆԵՐԸ</button>

        <h3>ԱՄԲՈՂՋ ԷԿՐԱՆ</h3>
        <input type="text" id="full-url" placeholder="URL">
        <button class="btn-full" onclick="sendFull()">ԲԱՑԵԼ</button>

        <button class="btn-clear" onclick="clearAll()">CLEAR (Մաքրել էկրանը)</button>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyA6xviZrFZIfpbSOQXqsJyuvXlLVK3tgFU",
            authDomain: "jrvezh-earlyone.firebaseapp.com",
            databaseURL: "https://jrvezh-earlyone-default-rtdb.firebaseio.com",
            projectId: "jrvezh-earlyone",
            storageBucket: "jrvezh-earlyone.firebasestorage.app",
            messagingSenderId: "438921283413",
            appId: "1:438921283413:web:bfa9c0c37d85dd696451dc"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function sendCall() {
            const select = document.getElementById('config-select');
            const selectedOption = select.options[select.selectedIndex];
            const ticketVal = document.getElementById('ticket').value;

            if(!ticketVal) {
                alert("Գրիր համարը");
                return;
            }

            const data = { 
                ticket: ticketVal, 
                window: selectedOption.value,
                logo: selectedOption.getAttribute('data-logo'),
                timestamp: Date.now()
            };
            
            // Ուղարկում ենք Firebase
            database.ref('queue_update').set(data);
        }

        function sendAds() {
            const urls = document.getElementById('ad-urls').value;
            database.ref('ad_update').set({ 
                urls: urls, 
                timestamp: Date.now() 
            });
        }

        function sendFull() {
            const url = document.getElementById('full-url').value;
            database.ref('full_screen_update').set({ 
                url: url, 
                timestamp: Date.now() 
            });
        }
    function clearTicket() {
    // Ուղարկում ենք դատարկ արժեքներ կտրոնի համար
    database.ref('queue_update').set({
        ticket: "",
        window: "",
        logo: "",
        ts: Date.now()
    });
}
        function clearAll() {
            database.ref('clear_system').set({ 
                timestamp: Date.now() 
            });
        }
    </script>
</body>
</html>
